name: OpenWebUI - LiteLLM
version: '3.8'
services:
    openwebui:
        image: ghcr.io/open-webui/open-webui:main
        container_name: open-webui
        ports:
            - "3000:8080"
        volumes:
            - ./data/openwebui:/app/backend/data:Z # Remove :Z if you are not using SELinux
        extra_hosts:
            - "host.docker.internal:host-gateway"
        environment:
            - WEBUI_AUTH=False
            - OPENAI_API_KEY=${MASTER_KEY}
            - OPENAI_API_BASE_URL=http://host.docker.internal:4000/v1
        restart: always

    litellm:
        image: ghcr.io/berriai/litellm-database:main-latest
        container_name: litellm
        env_file:
            - .env
        ports:
            - "4000:4000"
        volumes:
            - ./config.yml:/app/config.yaml:Z # Remove :Z if you are not using SELinux
        command: --config /app/config.yaml --port 4000
        restart: always
        environment:
            DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
            STORE_MODEL_IN_DB: "True"

    db:
        image: postgres
        restart: always
        volumes:
            - ./data/postgres:/var/lib/postgresql/data:Z # Remove :Z if you are not using SELinux
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 1s
            timeout: 5s
            retries: 10
